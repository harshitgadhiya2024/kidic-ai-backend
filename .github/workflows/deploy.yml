name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            APP_DIR="/home/${{ secrets.EC2_USER }}/kidic-ai"

            # Clone repo if it doesn't exist, otherwise pull latest
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/harshitgadhiya2024/kidic-ai-backend.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git pull origin main

            # Write .env file from GitHub secret
            echo "${{ secrets.ENV_FILE }}" > .env

            # Activate virtualenv and install/update dependencies
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Restart the app via systemd
            sudo systemctl restart kidic-ai

            echo "Deployment completed successfully"
