name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            APP_DIR="/home/${{ secrets.EC2_USER }}/kidic-ai"

            # Clone repo if not exists, otherwise pull latest
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/harshitgadhiya2024/kidic-ai-backend.git "$APP_DIR"
            else
              cd "$APP_DIR"
              git pull origin main
            fi

            cd "$APP_DIR"

            # Write .env file from GitHub secret
            echo "${{ secrets.ENV_FILE }}" > .env

            # Build and restart Docker container
            docker compose down --remove-orphans || true
            docker compose up -d --build

            # Remove unused Docker images to free disk space
            docker image prune -f

            echo "Deployment completed successfully"
