version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kidic-ai-api
    restart: always
    ports:
      - "8020:8020"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8020/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
